name: Build Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Build Release APK
      run: ./gradlew assembleRelease
      
    - name: Get version name
      id: version
      run: echo "VERSION_NAME=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*versionName = "\([^"]*\)".*/\1/')" >> $GITHUB_OUTPUT
      
    - name: Rename APK
      run: mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/blood-pressure-record-v${{ steps.version.outputs.VERSION_NAME }}-release.apk
      
    - name: Upload APK as artifact
      uses: actions/upload-artifact@v4
      with:
        name: blood-pressure-record-v${{ steps.version.outputs.VERSION_NAME }}
        path: app/build/outputs/apk/release/blood-pressure-record-v${{ steps.version.outputs.VERSION_NAME }}-release.apk
        
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        name: Release v${{ steps.version.outputs.VERSION_NAME }}
        tag_name: ${{ github.ref_name }}
        body: |
          ## 血压追踪 v${{ steps.version.outputs.VERSION_NAME }}
          
          ### 更新内容
          - 修复 Excel 导出空白表格问题
          - 修复导出时模板标题行被错误清除导致 Excel 表格空白的 Bug
          - 新增保留模板标题行逻辑，确保导出格式正确
          - 添加详细的导出诊断日志，便于问题排查
          - 增强模板加载错误处理和提示
          
          ### 下载
          下载下方的 APK 文件安装即可使用。
        files: app/build/outputs/apk/release/blood-pressure-record-v${{ steps.version.outputs.VERSION_NAME }}-release.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
