name: Build Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Build Release APK
      run: ./gradlew assembleRelease
      
    - name: Get version name
      id: version
      run: echo "VERSION_NAME=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*versionName = "\([^"]*\)".*/\1/')" >> $GITHUB_OUTPUT
      
    - name: Rename APK
      run: mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/blood-pressure-record-v${{ steps.version.outputs.VERSION_NAME }}-release.apk
      
    - name: Upload APK as artifact
      uses: actions/upload-artifact@v4
      with:
        name: blood-pressure-record-v${{ steps.version.outputs.VERSION_NAME }}
        path: app/build/outputs/apk/release/blood-pressure-record-v${{ steps.version.outputs.VERSION_NAME }}-release.apk
        
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: app/build/outputs/apk/release/blood-pressure-record-v${{ steps.version.outputs.VERSION_NAME }}-release.apk
        generate_release_notes: true
